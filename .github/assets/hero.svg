<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" width="1280" height="460" role="img" aria-label="hebb — a connected memory for your notes, served to your AI over the Model Context Protocol.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="0.55" stop-color="#0f1424"/>
      <stop offset="1" stop-color="#141c33"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.32"/>
      <stop offset="0.6" stop-color="#2dd4bf" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0f1424" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hubglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1280" height="460" rx="18" fill="url(#bg)"/>
  <ellipse cx="980" cy="220" rx="430" ry="320" fill="url(#glow)"/>

  <!-- knowledge graph motif -->
  <g stroke="#3c4a72" stroke-opacity="0.6" stroke-width="1.6">
    <line x1="1010" y1="205" x2="980" y2="120"/>
    <line x1="1010" y1="205" x2="900" y2="205"/>
    <line x1="1010" y1="205" x2="1030" y2="120"/>
    <line x1="1010" y1="205" x2="1120" y2="160"/>
    <line x1="1010" y1="205" x2="1035" y2="300"/>
    <line x1="1010" y1="205" x2="945" y2="320"/>
    <line x1="1010" y1="205" x2="1140" y2="280"/>
    <line x1="980" y1="120" x2="1030" y2="120"/>
    <line x1="1030" y1="120" x2="1120" y2="160"/>
    <line x1="1120" y1="160" x2="1190" y2="220"/>
    <line x1="1140" y1="280" x2="1190" y2="220"/>
    <line x1="1140" y1="280" x2="1190" y2="350"/>
    <line x1="900" y1="205" x2="945" y2="320"/>
    <line x1="945" y1="320" x2="1035" y2="300"/>
    <line x1="1035" y1="300" x2="1075" y2="370"/>
  </g>

  <!-- central recall hub -->
  <circle cx="1010" cy="205" r="42" fill="url(#hubglow)"/>
  <circle cx="1010" cy="205" r="15" fill="#fde68a"/>
  <circle cx="1010" cy="205" r="15" fill="none" stroke="#fbbf24" stroke-width="2"/>

  <!-- nodes -->
  <g>
    <circle cx="980"  cy="120" r="9"  fill="#818cf8"/>
    <circle cx="1030" cy="120" r="7"  fill="#a78bfa"/>
    <circle cx="1120" cy="160" r="10" fill="#38bdf8"/>
    <circle cx="900"  cy="205" r="12" fill="#2dd4bf"/>
    <circle cx="1190" cy="220" r="8"  fill="#818cf8"/>
    <circle cx="1140" cy="280" r="10" fill="#22d3ee"/>
    <circle cx="945"  cy="320" r="8"  fill="#a78bfa"/>
    <circle cx="1035" cy="300" r="9"  fill="#2dd4bf"/>
    <circle cx="1075" cy="370" r="7"  fill="#38bdf8"/>
    <circle cx="1190" cy="350" r="7"  fill="#22d3ee"/>
  </g>

  <!-- wordmark -->
  <text x="86" y="196" font-family="Helvetica, Arial, sans-serif" font-size="142" font-weight="700" letter-spacing="-3" fill="url(#wordGrad)">hebb</text>

  <!-- gradient underline -->
  <rect x="90" y="218" width="300" height="5" rx="2.5" fill="url(#rule)"/>

  <!-- headline -->
  <text x="90" y="284" font-family="Helvetica, Arial, sans-serif" font-size="33" font-weight="600" fill="#eef1fa">A connected memory for your notes.</text>

  <!-- subhead -->
  <text x="90" y="324" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#94a3c8">Fast full-text search and a live link graph, served to your AI over the</text>
  <text x="90" y="350" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#94a3c8">Model Context Protocol. Plain markdown, always on your own machine.</text>

  <!-- feature pills -->
  <g font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="600">
    <g>
      <rect x="90"  y="388" width="132" height="34" rx="17" fill="#ffffff" fill-opacity="0.05" stroke="#818cf8" stroke-opacity="0.55"/>
      <text x="156" y="410" fill="#cdd6f4" text-anchor="middle">MCP-native</text>
    </g>
    <g>
      <rect x="234" y="388" width="132" height="34" rx="17" fill="#ffffff" fill-opacity="0.05" stroke="#a78bfa" stroke-opacity="0.55"/>
      <text x="300" y="410" fill="#cdd6f4" text-anchor="middle">SQLite FTS5</text>
    </g>
    <g>
      <rect x="378" y="388" width="182" height="34" rx="17" fill="#ffffff" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.55"/>
      <text x="469" y="410" fill="#cdd6f4" text-anchor="middle">Single static binary</text>
    </g>
    <g>
      <rect x="572" y="388" width="158" height="34" rx="17" fill="#ffffff" fill-opacity="0.05" stroke="#2dd4bf" stroke-opacity="0.55"/>
      <text x="651" y="410" fill="#cdd6f4" text-anchor="middle">Local &amp; private</text>
    </g>
  </g>
</svg>

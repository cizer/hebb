name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1 - build + fast tests. Gates every push and PR.
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"
            echo "Run: gofmt -w ."; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...
      - name: test (race detector)
        run: go test -race ./...
      - name: cross-compile release targets
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: '0'
        run: |
          for t in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64; do
            echo "building $t"
            GOOS="${t%/*}" GOARCH="${t#*/}" go build -o /dev/null ./cmd/hebb
          done

  # Stage 2 - acceptance in a production-like environment. Runs the built binary
  # end to end (see TESTING.md / scripts/acceptance.sh). Only after Stage 1 is green.
  acceptance:
    name: acceptance (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: acceptance harness
        run: ./scripts/acceptance.sh

  # Stage 3 - release. Runs only on a version tag, and only after build AND
  # acceptance have passed: `needs` gates it within this single workflow, so a
  # release can never publish ahead of (or in parallel with) CI. GoReleaser
  # cross-compiles and publishes the GitHub release from the tag.
  release:
    name: release
    needs: [build, acceptance]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release + upload assets
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When the Homebrew tap is enabled in .goreleaser.yaml, also pass:
          # HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

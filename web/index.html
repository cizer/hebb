<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>hebb</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%8D%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #ffffff;
    --fg: #202124;
    --muted: #5f6368;
    --crumb: #0e7490;
    --title: #4f46e5;
    --box: #ffffff;
    --border: #dfe1e5;
    --shadow: rgba(32, 33, 36, 0.18);
    --chip: #f1f3f4;
    --chip-fg: #3c4043;
    --mark: #fce8b2;
    --accent: #6366f1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #202124;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --crumb: #5eead4;
      --title: #a5b4fc;
      --box: #303134;
      --border: #5f6368;
      --shadow: rgba(0, 0, 0, 0.5);
      --chip: #303134;
      --chip-fg: #c7cace;
      --mark: #5c4d1f;
      --accent: #818cf8;
    }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: arial, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }

  .page { display: flex; flex-direction: column; align-items: center; }

  /* ------------------------------------------------------------------ tabs */

  .tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--border);
    width: 100%; max-width: 1040px; padding: 0 24px; margin-top: 12px;
  }
  .tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    padding: 8px 16px; font-size: 14px; cursor: pointer; color: var(--muted);
    margin-bottom: -1px; transition: color .12s, border-color .12s;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--fg); }

  /* ------------------------------------------------------------- hero / search */

  .hero {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 24px;
    min-height: 70vh; width: 100%;
    transition: min-height .25s ease;
  }
  body.has-results .hero {
    min-height: auto;
    align-items: center;
    padding: 18px 0 12px 0;
    border-bottom: 1px solid var(--border);
    width: 100%;
  }
  body.has-results .hero-inner {
    display: flex; align-items: center; gap: 26px;
    width: 100%; max-width: 1040px; padding: 0 24px;
  }
  .hero-inner {
    display: flex; flex-direction: column; align-items: center; gap: 26px; width: 100%;
  }

  .wordmark {
    font-family: "Product Sans", arial, sans-serif;
    font-weight: 700; letter-spacing: -1px;
    user-select: none; cursor: pointer; line-height: 1;
    font-size: 78px;
  }
  body.has-results .wordmark { font-size: 28px; }
  .wordmark .b { color: #818cf8; }
  .wordmark .r { color: #a78bfa; }
  .wordmark .y { color: #38bdf8; }
  .wordmark .g { color: #22d3ee; }
  .tagline { color: var(--muted); font-size: 14px; margin-top: -10px; }
  body.has-results .tagline { display: none; }

  .searchbar { width: 100%; max-width: 600px; }
  body.has-results .searchbar { max-width: 640px; }
  .box {
    display: flex; align-items: center; gap: 12px;
    background: var(--box);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 11px 18px;
    box-shadow: none;
    transition: box-shadow .15s, border-color .15s;
  }
  .box:hover, .box.focus {
    box-shadow: 0 1px 8px var(--shadow);
    border-color: transparent;
  }
  .box svg { flex: none; fill: var(--muted); }
  .box input {
    flex: 1; border: none; outline: none; background: transparent;
    color: var(--fg); font-size: 17px; line-height: 24px;
  }
  .box .clear {
    border: none; background: transparent; color: var(--muted);
    font-size: 22px; cursor: pointer; padding: 0 4px; display: none;
  }
  .box .clear.show { display: block; }

  .filters {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    margin-top: 4px;
  }
  body.has-results .filters { justify-content: flex-start; max-width: 1040px; width: 100%; padding: 0 24px; margin: 10px auto 0; }
  .chip {
    border: 1px solid var(--border); background: var(--chip); color: var(--chip-fg);
    border-radius: 16px; padding: 5px 13px; font-size: 13px; cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .chip:hover { border-color: var(--muted); }
  .chip.active { background: var(--accent); color: #fff; border-color: transparent; }
  .tagfilter {
    border: 1px solid var(--border); background: var(--chip); color: var(--chip-fg);
    border-radius: 16px; padding: 5px 13px; font-size: 13px; outline: none; width: 150px;
  }

  .results { width: 100%; max-width: 1040px; padding: 12px 24px 60px; }
  .meta { color: var(--muted); font-size: 13px; margin: 8px 0 18px; }
  .result {
    display: block; text-decoration: none; color: inherit;
    padding: 10px 12px; margin: 0 -12px 14px; border-radius: 10px;
  }
  .result:hover, .result.sel { background: var(--chip); }
  .result .crumb { color: var(--crumb); font-size: 13px; line-height: 18px; }
  .result .title { color: var(--title); font-size: 19px; line-height: 26px; margin: 1px 0 3px; }
  .result:hover .title { text-decoration: underline; }
  .result .snippet { color: var(--muted); font-size: 14px; line-height: 21px; }
  .result .snippet mark { background: var(--mark); color: inherit; padding: 0 1px; border-radius: 2px; }
  .result .tags { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
  .result .tag { font-size: 11px; color: var(--muted); background: var(--chip); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; }

  .empty { color: var(--muted); font-size: 15px; padding: 30px 0; }
  .empty b { color: var(--fg); }

  /* -------------------------------------------------------------- health tab */

  .health-panel {
    width: 100%; max-width: 1040px; padding: 24px 24px 60px;
  }

  /* Metric tiles row -- displayed below the fold, after the worklist */
  .metric-tiles {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 32px;
  }
  .metric-tile {
    background: var(--box); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 20px; min-width: 120px; flex: 1 1 120px;
  }
  .metric-tile .tile-value {
    font-size: 26px; font-weight: 700; color: var(--fg); line-height: 1.1;
  }
  .metric-tile .tile-label {
    font-size: 12px; color: var(--muted); margin-top: 4px;
  }

  /* Worklist sections -- one per finding type */
  .worklist-section { margin-bottom: 28px; }
  .worklist-header {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em;
    border-bottom: 1px solid var(--border); padding-bottom: 6px; margin-bottom: 10px;
  }
  .worklist-count {
    background: var(--chip); color: var(--chip-fg);
    border-radius: 10px; padding: 1px 8px; font-size: 12px; font-weight: 500;
    text-transform: none; letter-spacing: 0;
  }
  .worklist-desc {
    font-size: 13px; color: var(--muted); margin: 0 0 10px; line-height: 18px;
  }
  .worklist-more > summary {
    cursor: pointer; font-size: 13px; color: var(--accent);
    padding: 6px 0 2px; list-style: none; user-select: none;
  }
  .worklist-more > summary:hover { text-decoration: underline; }

  .finding-row {
    display: block; text-decoration: none; color: inherit;
    padding: 8px 10px; margin: 0 -10px 4px; border-radius: 8px;
  }
  .finding-row:hover { background: var(--chip); }
  .finding-path {
    color: var(--title); font-size: 14px; font-weight: 500; line-height: 20px;
  }
  .finding-row:hover .finding-path { text-decoration: underline; }
  .finding-detail {
    color: var(--muted); font-size: 13px; line-height: 19px; margin-top: 2px;
  }
  .finding-crumb {
    color: var(--crumb); font-size: 12px; line-height: 17px;
  }

  .health-empty {
    color: var(--muted); font-size: 15px; padding: 40px 0; text-align: center;
  }
  .health-empty b { color: var(--fg); }
  .health-loading { color: var(--muted); font-size: 14px; padding: 40px 0; text-align: center; }
  .health-error { color: #c5221f; font-size: 14px; padding: 16px 0; }

  /* Section headers above the worklist and metrics */
  .section-heading {
    font-size: 14px; font-weight: 600; color: var(--fg);
    margin: 0 0 16px;
  }
  .section-sub {
    font-size: 13px; color: var(--muted); margin: -10px 0 20px;
  }

  /* ----------------------------------------------------------------- footer */

  footer {
    width: 100%; max-width: 1040px; padding: 14px 24px 40px;
    color: var(--muted); font-size: 12px;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  footer .link { color: var(--muted); cursor: pointer; text-decoration: none; }
  footer .link:hover { color: var(--accent); text-decoration: underline; }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    display: inline-block; animation: spin .7s linear infinite; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="page">

  <!-- ----------------------------------------------------------------- hero / search -->
  <div class="hero" id="search-hero">
    <div class="hero-inner">
      <div class="wordmark" id="wordmark" title="Clear search">
        <span class="b">h</span><span class="r">e</span><span class="y">b</span><span class="g">b</span>
      </div>
      <select id="vault-select" class="vault-select" aria-label="Vault" style="display:none"></select>
      <div class="searchbar">
        <div class="box" id="box">
          <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 10-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1114 9.5 4.5 4.5 0 019.5 14z"/></svg>
          <input id="q" type="text" autocomplete="off" autofocus
                 placeholder="Search your vault" aria-label="Search your vault" />
          <button class="clear" id="clear" title="Clear" aria-label="Clear">&times;</button>
        </div>
      </div>
    </div>

    <div class="tagline" id="tagline"></div>

    <div class="filters" id="filters">
      <button class="chip active" data-prefix="">All</button>
      <button class="chip" data-prefix="1-Projects/">Projects</button>
      <button class="chip" data-prefix="2-Areas/">Areas</button>
      <button class="chip" data-prefix="3-Resources/">Resources</button>
      <button class="chip" data-prefix="4-Archives/">Archives</button>
      <input class="tagfilter" id="tagfilter" type="text" placeholder="tag filter&#8230;" aria-label="Tag filter" />
    </div>
  </div>

  <!-- ------------------------------------------------------------------- tabs -->
  <div class="tabs" id="tabs">
    <button class="tab-btn active" id="tab-search">Search</button>
    <button class="tab-btn" id="tab-health">Health</button>
  </div>

  <!-- --------------------------------------------------- search results pane -->
  <div class="results" id="results"></div>

  <!-- ---------------------------------------------------- health dashboard pane -->
  <div class="health-panel hidden" id="health-panel">
    <div id="health-content"></div>
  </div>

  <footer>
    <span id="footstats"></span>
    <a class="link" id="reindex" title="Rebuild the search index from disk">&#8635; refresh index</a>
    <a class="link" id="refresh-health" title="Re-run vault health checks">&#8635; refresh health</a>
    <span>Local &middot; FTS5 &middot; 127.0.0.1 only</span>
  </footer>
</div>

<script>
  const $ = (s) => document.querySelector(s);
  const qInput = $("#q"), box = $("#box"), clearBtn = $("#clear");
  const resultsEl = $("#results"), healthPanel = $("#health-panel"), healthContent = $("#health-content");
  const tabsEl = $("#tabs"), searchHero = $("#search-hero");
  const taglineEl = $("#tagline"), footstats = $("#footstats"), tagInput = $("#tagfilter");
  const tabSearch = $("#tab-search"), tabHealth = $("#tab-health");
  const refreshHealthBtn = $("#refresh-health");
  let prefix = "", tag = "", vaultName = "vault", sel = -1, lastResults = [];
  let activeTab = "search"; // "search" | "health"
  let healthLoaded = false;

  /* -------------------------------------------------------------- utilities */

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) => (
      { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
    ));
  }
  function highlight(snippet) {
    return escapeHtml(snippet)
      .replaceAll("&gt;&gt;&gt;", "<mark>")
      .replaceAll("&lt;&lt;&lt;", "</mark>");
  }
  function breadcrumb(path) {
    const parts = path.replace(/\.md$/i, "").split("/");
    parts.pop();
    return [vaultName, ...parts].join(" › ");
  }
  function noteName(path) {
    const parts = path.replace(/\.md$/i, "").split("/");
    return parts[parts.length - 1];
  }
  function obsidianLink(path) {
    const file = path.replace(/\.md$/i, "");
    return "obsidian://open?vault=" + encodeURIComponent(vaultName) + "&file=" + encodeURIComponent(file);
  }

  /* ----------------------------------------------------------- tab switching */

  function showTab(name) {
    activeTab = name;
    tabSearch.classList.toggle("active", name === "search");
    tabHealth.classList.toggle("active", name === "health");
    resultsEl.classList.toggle("hidden", name !== "search");
    healthPanel.classList.toggle("hidden", name !== "health");
    if (name === "health" && !healthLoaded) {
      loadHealth();
    }
  }

  tabSearch.addEventListener("click", () => showTab("search"));
  tabHealth.addEventListener("click", () => { showTab("health"); });
  refreshHealthBtn.addEventListener("click", () => { healthLoaded = false; loadHealth(); });

  /* ----------------------------------------------------- search view logic */

  function setHasResults(on) {
    document.body.classList.toggle("has-results", on);
  }

  function render(data) {
    lastResults = data.results;
    sel = -1;
    if (!data.query) { resultsEl.innerHTML = ""; setHasResults(false); return; }
    setHasResults(true);
    if (data.results.length === 0) {
      resultsEl.innerHTML =
        '<div class="meta">No results.</div>' +
        '<div class="empty">Nothing matched <b>' + escapeHtml(data.query) + "</b>" +
        (prefix ? " in " + escapeHtml(prefix) : "") +
        (tag ? " tagged #" + escapeHtml(tag) : "") + ".</div>";
      return;
    }
    let html = '<div class="meta">About ' + data.count + " result" +
      (data.count === 1 ? "" : "s") + " (" + data.ms + " ms)</div>";
    for (const r of data.results) {
      const tags = r.tags.slice(0, 6).map((t) => '<span class="tag">#' + escapeHtml(t) + "</span>").join("");
      html +=
        '<a class="result" href="' + escapeHtml(r.obsidian) + '">' +
          '<div class="crumb">' + escapeHtml(breadcrumb(r.path)) + "</div>" +
          '<div class="title">' + escapeHtml(r.title) + "</div>" +
          '<div class="snippet">' + highlight(r.snippet) + "</div>" +
          (tags ? '<div class="tags">' + tags + "</div>" : "") +
        "</a>";
    }
    resultsEl.innerHTML = html;
  }

  let timer = null, seq = 0;
  function search() {
    const q = qInput.value.trim();
    clearBtn.classList.toggle("show", q.length > 0);
    if (q.length < 2) { render({ query: "", results: [] }); syncHash(); return; }
    const my = ++seq;
    const params = new URLSearchParams({ q, limit: "25" });
    if (prefix) params.set("path_prefix", prefix);
    if (tag) params.set("tag", tag);
    fetch("/api/search?" + params.toString())
      .then((r) => r.json())
      .then((data) => { if (my === seq) { render(data); syncHash(); } })
      .catch(() => {});
  }
  function debouncedSearch() { clearTimeout(timer); timer = setTimeout(search, 140); }

  function syncHash() {
    const p = new URLSearchParams();
    if (qInput.value.trim()) p.set("q", qInput.value.trim());
    if (prefix) p.set("folder", prefix);
    if (tag) p.set("tag", tag);
    const h = p.toString();
    history.replaceState(null, "", h ? "#" + h : location.pathname);
  }

  qInput.addEventListener("input", debouncedSearch);
  box.addEventListener("focusin", () => box.classList.add("focus"));
  box.addEventListener("focusout", () => box.classList.remove("focus"));
  clearBtn.addEventListener("click", () => { qInput.value = ""; qInput.focus(); search(); });
  $("#wordmark").addEventListener("click", () => { qInput.value = ""; qInput.focus(); search(); });

  document.querySelectorAll(".chip").forEach((c) =>
    c.addEventListener("click", () => {
      document.querySelectorAll(".chip").forEach((x) => x.classList.remove("active"));
      c.classList.add("active");
      prefix = c.dataset.prefix;
      search();
    })
  );
  tagInput.addEventListener("input", () => { tag = tagInput.value.trim().replace(/^#/, ""); debouncedSearch(); });

  document.addEventListener("keydown", (e) => {
    if (e.key === "/" && document.activeElement !== qInput) { e.preventDefault(); qInput.focus(); return; }
    if (!lastResults.length) return;
    const items = resultsEl.querySelectorAll(".result");
    if (e.key === "ArrowDown") { e.preventDefault(); sel = Math.min(sel + 1, items.length - 1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); sel = Math.max(sel - 1, 0); }
    else if (e.key === "Enter" && sel >= 0) { items[sel].click(); return; }
    else if (e.key === "Escape") { qInput.value = ""; search(); qInput.blur(); return; }
    else return;
    items.forEach((it, i) => it.classList.toggle("sel", i === sel));
    if (items[sel]) items[sel].scrollIntoView({ block: "nearest" });
  });

  /* -------------------------------------------------- health dashboard logic */

  // findingTypeMeta maps the finding type key from the API to a display label
  // and a ranking comparator. The comparator receives two finding objects and
  // returns negative / zero / positive in the usual sort(a,b) convention.
  const findingTypeMeta = {
    dangling_link: {
      label: "Dangling links",
      desc: "A [[wiki-link]] whose target note does not exist. Create the note or fix the link.",
      // Rank alphabetically by source path: all dangling links are equally
      // urgent -- there is no honest proxy to order them further.
      sort: (a, b) => a.path.localeCompare(b.path),
    },
    para_drift: {
      label: "PARA drift",
      desc: "A note under 1-Projects/ untouched for a long time: likely a finished or abandoned project to archive.",
      sort: (a, b) => a.path.localeCompare(b.path),
    },
    oversized: {
      label: "Oversized notes",
      desc: "A long, multi-section note that may be worth splitting into smaller, focused notes.",
      // The detail string contains "~N tokens"; rank by that number descending
      // (largest split candidate first). Fall back to path if not parseable.
      sort: (a, b) => {
        const tok = (d) => { const m = d.detail.match(/~(\d+)\s+tokens/); return m ? parseInt(m[1], 10) : 0; };
        return tok(b) - tok(a);
      },
    },
    orphan: {
      label: "Orphans",
      desc: "A note nothing links to and that links to nothing: cut off from the rest of the graph.",
      // Detail contains "age N days"; rank by age descending (oldest first).
      sort: (a, b) => {
        const age = (d) => { const m = d.detail.match(/age\s+(\d+)\s+days/); return m ? parseInt(m[1], 10) : 0; };
        return age(b) - age(a);
      },
    },
    leaf: {
      label: "Leaves (single link)",
      desc: "A note with just one link: weakly connected. Consider linking it to related notes.",
      sort: (a, b) => {
        const age = (d) => { const m = d.detail.match(/age\s+(\d+)\s+days/); return m ? parseInt(m[1], 10) : 0; };
        return age(b) - age(a);
      },
    },
    island: {
      label: "Isolated clusters",
      desc: "A small group of notes linked only to each other, disconnected from the main graph.",
      // Detail contains "isolated cluster of N"; rank by cluster size descending.
      sort: (a, b) => {
        const sz = (d) => { const m = d.detail.match(/cluster of\s+(\d+)/); return m ? parseInt(m[1], 10) : 0; };
        return sz(b) - sz(a);
      },
    },
  };

  // How many findings to show per group before collapsing the rest behind a
  // "show more" line, so a big vault's worklist stays scannable.
  const FINDINGS_PER_GROUP = 8;

  // typeOrder drives the display order of finding groups in the worklist. Types
  // not in this list fall through to the end, sorted by type string.
  const typeOrder = ["dangling_link", "para_drift", "oversized", "orphan", "leaf", "island"];

  function renderHealth(data) {
    const findings = data.findings || [];
    const stats = data.stats || {};
    const num = (n) => (n || 0).toLocaleString("en-GB");

    let html = "";

    /* -- summary metrics, at the top for an at-a-glance read --------- */
    html += '<p class="section-heading">Vault at a glance</p>';
    html += '<p class="section-sub">Graph topology from the resolved link index. No single composite score.</p>';
    html += '<div class="metric-tiles">';
    html += tile("Notes", num(stats.node_count), "Indexed markdown notes");
    html += tile("Links", num(stats.edge_count), "Resolved wiki-links between notes");
    html += tile("Components", num(stats.component_count), "Disconnected clusters in the link graph");
    html += tile("Giant ratio", ((stats.giant_ratio || 0) * 100).toFixed(1) + "%", "Share of notes in the largest cluster");
    html += tile("Max k-core", stats.max_core || 0, "Densest core depth in the link graph");
    html += '</div>';

    /* -- worklist: grouped, explained, and capped per group ---------- */
    html += '<p class="section-heading" style="margin-top:32px">Worklist</p>';
    if (findings.length === 0) {
      html += '<div class="health-empty"><b>Clean vault.</b> No findings to action.</div>';
      healthContent.innerHTML = html;
      return;
    }
    html += '<p class="section-sub">' + findings.length + ' finding' + (findings.length === 1 ? "" : "s")
      + ' to review, grouped by type. Each links to the note in Obsidian.</p>';

    const groups = {};
    for (const f of findings) {
      if (!groups[f.type]) groups[f.type] = [];
      groups[f.type].push(f);
    }
    const sortedTypes = Object.keys(groups).sort((a, b) => {
      const ia = typeOrder.indexOf(a), ib = typeOrder.indexOf(b);
      if (ia === -1 && ib === -1) return a.localeCompare(b);
      if (ia === -1) return 1;
      if (ib === -1) return -1;
      return ia - ib;
    });

    const rowHtml = (f) =>
      '<a class="finding-row" href="' + escapeHtml(obsidianLink(f.path)) + '">' +
        '<div class="finding-crumb">' + escapeHtml(breadcrumb(f.path)) + '</div>' +
        '<div class="finding-path">' + escapeHtml(noteName(f.path)) + '</div>' +
        '<div class="finding-detail">' + escapeHtml(f.detail) + '</div>' +
      '</a>';

    for (const type of sortedTypes) {
      const rows = groups[type];
      const meta = findingTypeMeta[type] || { label: type, sort: (a, b) => a.path.localeCompare(b.path) };
      rows.sort(meta.sort);

      html += '<div class="worklist-section">';
      html += '<div class="worklist-header">' + escapeHtml(meta.label)
        + ' <span class="worklist-count">' + rows.length + '</span></div>';
      if (meta.desc) html += '<p class="worklist-desc">' + escapeHtml(meta.desc) + '</p>';

      for (const f of rows.slice(0, FINDINGS_PER_GROUP)) html += rowHtml(f);

      const rest = rows.slice(FINDINGS_PER_GROUP);
      if (rest.length) {
        html += '<details class="worklist-more"><summary>Show ' + rest.length + ' more</summary>';
        for (const f of rest) html += rowHtml(f);
        html += '</details>';
      }
      html += '</div>';
    }

    healthContent.innerHTML = html;
  }

  function tile(label, value, desc) {
    return '<div class="metric-tile">'
      + '<div class="tile-value">' + escapeHtml(String(value)) + '</div>'
      + '<div class="tile-label">' + escapeHtml(label) + (desc ? '<br><span style="font-style:italic">' + escapeHtml(desc) + '</span>' : '') + '</div>'
      + '</div>';
  }

  function loadHealth() {
    healthLoaded = true;
    healthContent.innerHTML = '<div class="health-loading"><span class="spinner"></span> Running health checks&hellip;</div>';
    fetch("/api/health")
      .then((r) => {
        if (!r.ok) return r.json().then((e) => { throw new Error(e.error || r.statusText); });
        return r.json();
      })
      .then((data) => { renderHealth(data); })
      .catch((err) => {
        healthLoaded = false;
        healthContent.innerHTML = '<div class="health-error">Health check failed: ' + escapeHtml(String(err)) + '</div>';
      });
  }

  /* ------------------------------------------------------- index refresh */

  $("#reindex").addEventListener("click", (e) => {
    const el = e.target;
    const old = el.textContent;
    el.innerHTML = '<span class="spinner"></span> reindexing&hellip;';
    fetch("/api/reindex", { method: "POST" })
      .then((r) => r.json())
      .then((d) => {
        el.textContent = "✓ " + d.indexed + " notes";
        loadStats();
        search();
        // Invalidate cached health so the next visit to the tab re-runs.
        healthLoaded = false;
        setTimeout(() => (el.textContent = old), 2500);
      })
      .catch(() => (el.textContent = old));
  });

  /* -------------------------------------------------------------- stats */

  function loadStats() {
    fetch("/api/stats").then((r) => r.json()).then((s) => {
      vaultName = s.vaultName || vaultName;
      taglineEl.textContent = "Searching " + s.noteCount.toLocaleString("en-GB") +
        " notes · " + s.linkCount.toLocaleString("en-GB") + " links";
      footstats.textContent = s.noteCount.toLocaleString("en-GB") + " notes indexed";
      if (lastResults.length || qInput.value) render({ query: qInput.value.trim(), count: lastResults.length, ms: 0, results: lastResults });
    });
  }

  /* -------------------------------------------------------- hash restore */

  function restore() {
    const h = new URLSearchParams(location.hash.slice(1));
    if (h.get("folder")) {
      prefix = h.get("folder");
      document.querySelectorAll(".chip").forEach((c) =>
        c.classList.toggle("active", c.dataset.prefix === prefix));
    }
    if (h.get("tag")) { tag = h.get("tag"); tagInput.value = tag; }
    if (h.get("q")) { qInput.value = h.get("q"); search(); }
    if (h.get("view") === "health") {
      showTab("health");
    }
  }

  // Multi-vault switcher: populate the picker from /api/vaults and show it only
  // when more than one vault is served. Absent endpoint (single-vault server) or
  // a single vault leaves it hidden. Changing it pins the vault via a cookie.
  function loadVaults() {
    fetch("/api/vaults")
      .then((r) => (r.ok ? r.json() : null))
      .then((d) => {
        if (!d || !d.vaults || d.vaults.length < 2) return;
        const sel = document.getElementById("vault-select");
        sel.innerHTML = "";
        for (const v of d.vaults) {
          const o = document.createElement("option");
          o.value = v.slug;
          o.textContent = v.name;
          if (v.slug === d.active) o.selected = true;
          sel.appendChild(o);
        }
        sel.style.display = "";
        sel.addEventListener("change", () => {
          location.href = "/?vault=" + encodeURIComponent(sel.value);
        });
      })
      .catch(() => {});
  }

  loadVaults();
  loadStats();
  restore();
  qInput.focus();
</script>
</body>
</html>

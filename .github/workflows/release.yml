name: release

# Cut a release when a version tag is pushed. The tagged commit has already
# passed CI (Stage 1 + acceptance) on its way onto main; this re-runs the fast
# suite as a gate, then GoReleaser cross-compiles and publishes the release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release + upload assets

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When the Homebrew tap is enabled in .goreleaser.yaml, also pass:
          # HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
